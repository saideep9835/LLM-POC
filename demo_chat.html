<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Chat + Sentiment Demo</title>
  <style>
    :root { font-family: Arial, sans-serif; }
    body { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 0.25rem; }
    .hint { color: #555; margin-top: 0; }
    .row { display: flex; gap: 1rem; flex-wrap: wrap; margin: 1rem 0; }
    label { font-size: 0.9rem; color: #333; display: block; margin-bottom: 0.25rem; }
    input, select, textarea, button { font: inherit; }
    input, select, textarea {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      box-sizing: border-box;
    }
    textarea { min-height: 120px; resize: vertical; }
    .field { flex: 1; min-width: 180px; }
    button {
      background: #111827;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 1rem;
      margin-top: 1rem;
      background: #fafafa;
    }
    .section-title { margin: 1.25rem 0 0.5rem 0; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap; }
    .error { color: #b00020; }
  </style>
</head>
<body>
  <h1>LLM Chat + Sentiment Demo</h1>
  <p class="hint">Use this UI for chat, or run Azure sentiment analysis on text/document content.</p>

  <div class="row">
    <div class="field">
      <label for="baseUrl">Backend URL</label>
      <input id="baseUrl" value="http://127.0.0.1:8000" />
    </div>
    <div class="field">
      <label for="provider">Provider</label>
      <select id="provider">
        <option value="openai">openai</option>
        <option value="anthropic">anthropic</option>
      </select>
    </div>
  </div>

  <h3 class="section-title">Chat (OpenAI/Anthropic)</h3>
  <label for="prompt">Ask something</label>
  <textarea id="prompt" placeholder="Type your message here...">Explain AI in simple words.</textarea>

  <div class="row">
    <button id="sendBtn">Send Request</button>
    <button id="checkProvidersBtn" type="button">Check Available Providers</button>
  </div>

  <h3 class="section-title">Sentiment Analysis (Azure Language)</h3>
  <label for="sentimentText">Text to analyze (optional if uploading file)</label>
  <textarea id="sentimentText" placeholder="Type text for sentiment analysis..."></textarea>

  <div class="row">
    <div class="field">
      <label for="language">Language</label>
      <input id="language" value="en" />
    </div>
    <div class="field">
      <label for="docFile">Upload Document (.pdf, .docx, .txt)</label>
      <input id="docFile" type="file" accept=".pdf,.docx,.txt,text/plain,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
    </div>
  </div>

  <div class="row">
    <button id="analyzeSentimentBtn" type="button">Analyze Sentiment</button>
  </div>

  <div class="card">
    <h3>Response / Sentiment Result</h3>
    <div id="response" class="mono">(waiting for request)</div>
  </div>

  <div class="card">
    <h3>Performance</h3>
    <div id="performance" class="mono">(no data yet)</div>
  </div>

  <div class="card">
    <h3>Status</h3>
    <div id="status" class="mono">Ready.</div>
  </div>

  <script>
    const baseUrlEl = document.getElementById('baseUrl');
    const providerEl = document.getElementById('provider');
    const promptEl = document.getElementById('prompt');
    const sendBtn = document.getElementById('sendBtn');
    const checkProvidersBtn = document.getElementById('checkProvidersBtn');
    const sentimentTextEl = document.getElementById('sentimentText');
    const languageEl = document.getElementById('language');
    const docFileEl = document.getElementById('docFile');
    const analyzeSentimentBtn = document.getElementById('analyzeSentimentBtn');
    const responseEl = document.getElementById('response');
    const performanceEl = document.getElementById('performance');
    const statusEl = document.getElementById('status');

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.className = isError ? 'mono error' : 'mono';
    }

    async function sendChat() {
      const baseUrl = baseUrlEl.value.trim().replace(/\/$/, '');
      const provider = providerEl.value;
      const message = promptEl.value.trim();

      if (!message) {
        setStatus('Please enter a prompt first.', true);
        return;
      }

      sendBtn.disabled = true;
      setStatus('Sending request...');
      responseEl.textContent = '(loading...)';
      performanceEl.textContent = '(loading...)';

      try {
        const url = `${baseUrl}/api/v1/chat/simple?message=${encodeURIComponent(message)}&provider=${encodeURIComponent(provider)}`;
        const res = await fetch(url, { method: 'POST' });
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || JSON.stringify(data));
        }

        responseEl.textContent = data.response || '(empty response)';
        performanceEl.textContent = JSON.stringify(data.performance, null, 2);
        setStatus('Success ✅');
      } catch (err) {
        responseEl.textContent = '(request failed)';
        performanceEl.textContent = '(no performance data)';
        setStatus(`Error: ${err.message}`, true);
      } finally {
        sendBtn.disabled = false;
      }
    }

    async function getTextFromInputOrFile() {
      const directText = sentimentTextEl.value.trim();
      if (directText) return directText;

      const file = docFileEl.files && docFileEl.files[0];
      if (!file) return '';

      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || '').trim());
        reader.onerror = () => reject(new Error('Failed to read uploaded file.'));
        reader.readAsText(file);
      });
    }

    async function analyzeSentimentFromDocument(file, language, baseUrl) {
      const form = new FormData();
      form.append('file', file);
      form.append('language', language);

      const res = await fetch(`${baseUrl}/api/v1/sentiment/document`, {
        method: 'POST',
        body: form
      });

      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.detail || JSON.stringify(data));
      }
      return data;
    }

    async function analyzeSentiment() {
      const baseUrl = baseUrlEl.value.trim().replace(/\/$/, '');
      const language = (languageEl.value || 'en').trim();

      analyzeSentimentBtn.disabled = true;
      setStatus('Preparing sentiment input...');
      responseEl.textContent = '(loading...)';
      performanceEl.textContent = '(not applicable for sentiment endpoint)';

      try {
        const text = sentimentTextEl.value.trim();
        const file = docFileEl.files && docFileEl.files[0];

        if (!text && !file) {
          throw new Error('Provide text or upload a text document first.');
        }

        let data;
        if (text) {
          const res = await fetch(`${baseUrl}/api/v1/sentiment/text`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, language })
          });

          data = await res.json();
          if (!res.ok) {
            throw new Error(data.detail || JSON.stringify(data));
          }
        } else {
          data = await analyzeSentimentFromDocument(file, language, baseUrl);
        }

        responseEl.textContent = JSON.stringify(data, null, 2);
        setStatus('Sentiment analysis success ✅');
      } catch (err) {
        responseEl.textContent = '(sentiment request failed)';
        setStatus(`Error: ${err.message}`, true);
      } finally {
        analyzeSentimentBtn.disabled = false;
      }
    }

    async function checkProviders() {
      const baseUrl = baseUrlEl.value.trim().replace(/\/$/, '');
      setStatus('Checking providers...');
      try {
        const res = await fetch(`${baseUrl}/api/v1/providers`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || JSON.stringify(data));

        const available = data.available_providers || [];
        const current = providerEl.value;
        providerEl.innerHTML = '';

        if (available.length === 0) {
          providerEl.innerHTML = '<option value="">(none available)</option>';
          setStatus('No providers available. Check your API keys in .env', true);
          return;
        }

        for (const p of available) {
          const opt = document.createElement('option');
          opt.value = p;
          opt.textContent = p;
          providerEl.appendChild(opt);
        }

        if (available.includes(current)) providerEl.value = current;
        setStatus(`Available providers: ${available.join(', ')}`);
      } catch (err) {
        setStatus(`Error checking providers: ${err.message}`, true);
      }
    }

    sendBtn.addEventListener('click', sendChat);
    checkProvidersBtn.addEventListener('click', checkProviders);
    analyzeSentimentBtn.addEventListener('click', analyzeSentiment);

    // Initial provider check on load
    checkProviders();
  </script>
</body>
</html>
