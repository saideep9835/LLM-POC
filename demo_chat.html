<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Intelligence Demo</title>
  <style>
    :root { font-family: Arial, sans-serif; }
    body { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 0.25rem; }
    .hint { color: #555; margin-top: 0; }
    .row { display: flex; gap: 1rem; flex-wrap: wrap; margin: 1rem 0; }
    label { font-size: 0.9rem; color: #333; display: block; margin-bottom: 0.25rem; }
    input, select, textarea, button { font: inherit; }
    input, select, textarea {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      box-sizing: border-box;
    }
    .field { flex: 1; min-width: 180px; }
    button {
      background: #111827;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 1rem;
      margin-top: 1rem;
      background: #fafafa;
    }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap; }
    .error { color: #b00020; }
    .progress-wrap { display: none; margin: 1rem 0; }
    .progress-label { font-size: 0.85rem; color: #555; margin-bottom: 0.4rem; }
    .progress-bar-bg {
      width: 100%;
      height: 10px;
      background: #e5e7eb;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: #111827;
      border-radius: 99px;
      transition: width 0.6s ease;
    }
  </style>
</head>
<body>
  <h1>Video Intelligence Demo</h1>
  <p class="hint">Analyze pitch videos using Azure Video Indexer and AI scoring.</p>

  <div class="row">
    <div class="field">
      <label for="baseUrl">Backend URL</label>
      <input id="baseUrl" value="http://127.0.0.1:8000" />
    </div>
  </div>

  <h3>Video Analysis (Video Indexer ➜ Pitch Scores)</h3>
  <div class="row">
    <div class="field">
      <label for="videoFile">Upload Video (.mp4, .mov, .avi, .wmv, .webm)</label>
      <input id="videoFile" type="file" accept=".mp4,.mov,.avi,.wmv,.webm,video/*" />
    </div>
  </div>

  <div class="row">
    <button id="analyzeVideoBtn" type="button">Analyze Video</button>
    <button id="processQueueBtn" type="button">Process Queue (Supabase)</button>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label" id="progressLabel">Processing... 0%</div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="card">
    <h3>Result</h3>
    <div id="response" class="mono">(waiting for request)</div>
  </div>

  <div class="card">
    <h3>Status</h3>
    <div id="status" class="mono">Ready.</div>
  </div>

  <script>
    const baseUrlEl = document.getElementById('baseUrl');
    const videoFileEl = document.getElementById('videoFile');
    const analyzeVideoBtn = document.getElementById('analyzeVideoBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');

    let progressTimer = null;

    function startProgress(labelPrefix = 'Processing') {
      progressWrap.style.display = 'block';
      let pct = 0;
      setProgress(0, `${labelPrefix}... 0%`);
      // Ramp to 90% over ~110s (VI typically takes 60-120s)
      progressTimer = setInterval(() => {
        if (pct < 90) {
          pct += pct < 50 ? 2 : pct < 75 ? 1 : 0.4;
          pct = Math.min(pct, 90);
          setProgress(pct, `${labelPrefix}... ${Math.round(pct)}%`);
        }
      }, 1200);
    }

    function finishProgress(label = 'Complete') {
      clearInterval(progressTimer);
      setProgress(100, label);
      setTimeout(() => { progressWrap.style.display = 'none'; }, 2000);
    }

    function resetProgress() {
      clearInterval(progressTimer);
      progressWrap.style.display = 'none';
      setProgress(0, '');
    }

    function setProgress(pct, label) {
      progressFill.style.width = `${pct}%`;
      progressLabel.textContent = label;
    }
    const processQueueBtn = document.getElementById('processQueueBtn');
    const responseEl = document.getElementById('response');
    const statusEl = document.getElementById('status');

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.className = isError ? 'mono error' : 'mono';
    }

    async function analyzeVideo() {
      const baseUrl = baseUrlEl.value.trim().replace(/\/$/, '');
      const file = videoFileEl.files && videoFileEl.files[0];

      if (!file) {
        setStatus('Please upload a video file first.', true);
        return;
      }

      analyzeVideoBtn.disabled = true;
      setStatus('Uploading video...');
      responseEl.textContent = '(processing...)';
      setProgress(0, 'Starting...');
      progressWrap.style.display = 'block';

      try {
        const form = new FormData();
        form.append('file', file);

        const res = await fetch(`${baseUrl}/api/v1/sentiment/video/stream`, {
          method: 'POST',
          body: form,
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || JSON.stringify(err));
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let finalResult = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop(); // keep incomplete line

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            let event;
            try { event = JSON.parse(line.slice(6)); } catch { continue; }

            setProgress(event.progress, event.message);
            setStatus(event.message);

            if (event.stage === 'error') {
              resetProgress();
              setStatus(`Error: ${event.message}`, true);
              responseEl.textContent = '(analysis failed)';
              return;
            }

            if (event.stage === 'done') {
              finalResult = event.result;
            }
          }
        }

        if (!finalResult) throw new Error('No result received from stream');

        const ps = finalResult.pitch_scores;
        const dims = ['team_strength', 'technical_strength', 'innovation', 'credibility', 'confidence'];
        const dimLabels = {
          team_strength:      'Team Strength     ',
          technical_strength: 'Technical Strength',
          innovation:         'Innovation        ',
          credibility:        'Credibility       ',
          confidence:         'Confidence        ',
        };

        const summary = [
          `=== PITCH SCORES ===`,
          `Video: ${finalResult.video_id}  |  Response Time: ${finalResult.response_time_seconds}s`,
          ...(ps ? [
            ``,
            ...dims.map(d => {
              const dim = ps[d];
              return `${dimLabels[d]}  ${dim.score.toFixed(1)} / 10  [${dim.evidence_strength}]`;
            }),
            ``,
            ...dims.flatMap(d => {
              const dim = ps[d];
              return [
                `  ${dimLabels[d].trim()} reasoning:`,
                ...dim.reasoning.map(r => `    - ${r}`),
              ];
            }),
          ] : [`  (not available)`]),
        ].join('\n');

        responseEl.textContent = summary;
        finishProgress('Analysis complete ✓');
        setStatus('Video analysis complete');
      } catch (err) {
        resetProgress();
        responseEl.textContent = '(video analysis failed)';
        setStatus(`Error: ${err.message}`, true);
      } finally {
        analyzeVideoBtn.disabled = false;
      }
    }

    async function processQueue() {
      const baseUrl = baseUrlEl.value.trim().replace(/\/$/, '');
      processQueueBtn.disabled = true;
      setStatus('Processing queue... this may take several minutes.');
      responseEl.textContent = '(loading...)';
      startProgress('Processing queue');

      try {
        const res = await fetch(`${baseUrl}/api/v1/sentiment/process-queue`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || JSON.stringify(data));

        if (data.processed === 0) {
          resetProgress();
          responseEl.textContent = 'No unprocessed videos found in queue.';
          setStatus('Queue empty');
          return;
        }

        const lines = [`Processed: ${data.processed} video(s)`, ``];
        for (const r of data.results) {
          lines.push(`ID: ${r.id}  →  ${r.status}`);
          if (r.status === 'ok') {
            const s = r.scores;
            lines.push(`  Team Strength:       ${s.team_strength} / 10`);
            lines.push(`  Technical Strength:  ${s.technical_strength} / 10`);
            lines.push(`  Innovation:          ${s.innovation} / 10`);
            lines.push(`  Credibility:         ${s.credibility} / 10`);
            lines.push(`  Confidence:          ${s.confidence} / 10`);
          } else {
            lines.push(`  Error: ${r.detail}`);
          }
          lines.push(``);
        }

        responseEl.textContent = lines.join('\n');
        finishProgress('Queue complete ✓');
        setStatus('Queue processing complete');
      } catch (err) {
        resetProgress();
        responseEl.textContent = '(queue processing failed)';
        setStatus(`Error: ${err.message}`, true);
      } finally {
        processQueueBtn.disabled = false;
      }
    }

    analyzeVideoBtn.addEventListener('click', analyzeVideo);
    processQueueBtn.addEventListener('click', processQueue);
  </script>
</body>
</html>
